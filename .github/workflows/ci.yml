# Intégration continue — réutilise l'infra locale telle quelle :
# make test (pipeline CDP en Docker) et make paquet / make test-deb
# (.deb installé dans debian:bookworm et ubuntu:24.04 vierges).
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + format (biome)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: make lint
        run: make lint

  test:
    name: Pipeline CDP (Docker dev)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: make test
        run: make test

  paquet:
    name: Paquet .deb + distributions vierges
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # tags nécessaires à git describe (version du .deb)

      - name: Cache chrome-headless-shell (version épinglée)
        uses: actions/cache@v5
        with:
          path: dist/cache
          key: chs-${{ hashFiles('scripts/chs-version') }}

      - name: make paquet
        run: make paquet

      - name: make test-deb
        run: make test-deb

      - name: Chronométrage → résumé du run
        run: make chrono-deb | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Artefact .deb (téléchargeable depuis le run)
        uses: actions/upload-artifact@v7
        with:
          name: tampon-deb
          path: dist/tampon_*_amd64.deb
          if-no-files-found: error
