services:
  atelier:
    build: .
    ports:
      - "3000:3000"
    environment:
      - TAMPON_DIR=/app
      - TIRAGES_DIR=/app/tirages
      - LOGS_DIR=/app/logs
    volumes:
      - ./tirages:/app/tirages
      - ./logs:/app/logs
      - ~/.local/share/fonts:/usr/local/share/fonts:ro
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped
