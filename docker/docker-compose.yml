name: tampon

services:
  atelier:
    container_name: tampon-atelier
    build:
      context: ..
      dockerfile: docker/atelier/Dockerfile
      args:
        BUN_VERSION: ${BUN_VERSION}
    ports:
      - "${PORT_HOTE:-3000}:3000"
    volumes:
      - ../tirages:/app/tirages
      - ../logs:/app/logs
    restart: unless-stopped
